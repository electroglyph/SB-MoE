init:
  doc_model: 'Alibaba-NLP/gte-modernbert-base'
  tokenizer: ${model.init.doc_model}
  device: 'cuda'
  aggregation_mode: 'cls'
  embedding_size: 768
  save_model: 'gte-modernbert'
  specialized_mode: 'sbmoe_all'
  max_tokenizer_length: 512
  normalize: True
  temperature: 0.02
adapters:
  num_experts: 5
  residual: True
  latent_size: 384
  non_linearity: 'gelu'
  use_adapters: True
  aux_loss_coeff: 0.01
continue_train: False
